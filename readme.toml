[[sections]]
title = "课程内容"

[[sections.items]]
content = """
**本部《智能系统控制实践》23级授课内容概要：**

1. **基础理论**：
    - 绪论：控制系统组成、接口、发展历史。
    - 电机原理与特性：直流电机（静态/动态特性、选型）、交流同步电机、感应电机及步进电机原理。
    - 传感器：编码器、光栅的结构与工作原理。
    - 设计流程：控制系统设计的主要内容与关键要素。

2. **误差与信号分析**：
    - 典型输入信号：性能需求分析、傅里叶分析。
    - 静态误差：误差系数计算、减小静差的方法。
    - 动态误差：动态误差系数、影响因素、跟踪误差。

3. **系统性能与抗扰**：
    - 噪声与干扰：定义、特性、抑制方法、评价指标。
    - 干扰观测器：结构设计、参数原则、干扰补偿。
    - 不确定性：鲁棒稳定性定理约束。
    - 带宽设计：指标定义、压低/拓展带宽的方法。
    - 抗饱和设计：Windup 现象、PI 控制器抗饱和。

4. **系统类型与设计**：
    - 伺服系统：模型描述、I型/改进I型设计。
    - 调节系统：PID 控制器设计。
    - 多回路控制：结构、设计原则。

5. **智能控制**：
    - 专家控制：基本方法与应用。
    - 模糊控制：基本原理、控制器设计与应用。
"""


